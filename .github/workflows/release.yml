name: release

on:
  create:
    tags:
      - v*

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: docker/setup-qemu-action@v1
      - uses: docker/setup-buildx-action@v1

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - run: docker pull azotd1/devops-example-app:latest   
      - run: docker tag azotd1/devops-example-app:latest azotd1/devops-example-app:${{ github.ref_name }}
      - run: docker push azotd1/devops-example-app:${{ github.ref_name }}

      - run: docker pull azotd1/devops-example-caddy:latest  
      - run: docker tag azotd1/devops-example-caddy:latest azotd1/devops-example-caddy:${{ github.ref_name }}
      - run: docker push azotd1/devops-example-caddy:${{ github.ref_name }}